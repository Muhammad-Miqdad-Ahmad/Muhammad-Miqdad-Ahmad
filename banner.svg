<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1000 250" width="1000" height="250" font-family="'JetBrains Mono','DejaVu Sans Mono','Courier New',monospace" role="img" aria-label="Muhammad Miqdad Ahmad — Embedded Systems Engineer">
  <!-- board -->
  <rect x="1" y="1" width="998" height="248" rx="16" fill="#130A20" stroke="#392456" stroke-width="1.5"/>

  <!-- corner solder pads -->
  <circle cx="20" cy="20" r="4" fill="#7C5AA6" opacity="0.6"/>
  <circle cx="980" cy="20" r="4" fill="#7C5AA6" opacity="0.6"/>
  <circle cx="20" cy="230" r="4" fill="#7C5AA6" opacity="0.6"/>
  <circle cx="980" cy="230" r="4" fill="#7C5AA6" opacity="0.6"/>

  <!-- decorative circuit traces (right side) -->
  <g stroke="#7C5AA6" stroke-width="1.4" fill="none" opacity="0.55" stroke-linecap="round">
    <path id="trace1" d="M672 58 H812 V104 H904"/>
    <path d="M700 210 V150 H828 V96"/>
    <path d="M760 210 V178 H930 V60"/>
    <path d="M672 120 H720 V196"/>
    <path d="M904 104 H956"/>
  </g>
  <!-- vias -->
  <g fill="#7C5AA6" opacity="0.7">
    <circle cx="672" cy="58" r="3"/><circle cx="812" cy="104" r="3"/>
    <circle cx="828" cy="150" r="3"/><circle cx="700" cy="210" r="3"/>
    <circle cx="930" cy="178" r="3"/><circle cx="720" cy="120" r="3"/>
    <circle cx="672" cy="120" r="3"/>
  </g>

  <!-- traveling signal pulse along trace1 -->
  <circle r="3.6" fill="#34E1E6">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="0s" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath xlink:href="#trace1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0.9;0" keyTimes="0;0.12;0.7;0.9;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- lit signal nodes -->
  <g fill="#34E1E6">
    <circle cx="904" cy="104" r="4.5">
      <animate attributeName="r" values="4.5;6.5;4.5" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="60" r="4"/>
    <circle cx="720" cy="196" r="3.5"/>
  </g>

  <!-- IC chip (left) -->
  <g transform="translate(46,83)">
    <g fill="#7C5AA6">
      <rect x="-7" y="16" width="7" height="8" rx="1.5"/><rect x="-7" y="38" width="7" height="8" rx="1.5"/><rect x="-7" y="60" width="7" height="8" rx="1.5"/>
      <rect x="84" y="16" width="7" height="8" rx="1.5"/><rect x="84" y="38" width="7" height="8" rx="1.5"/><rect x="84" y="60" width="7" height="8" rx="1.5"/>
      <rect x="16" y="-7" width="8" height="7" rx="1.5"/><rect x="38" y="-7" width="8" height="7" rx="1.5"/><rect x="60" y="-7" width="8" height="7" rx="1.5"/>
      <rect x="16" y="84" width="8" height="7" rx="1.5"/><rect x="38" y="84" width="8" height="7" rx="1.5"/><rect x="60" y="84" width="8" height="7" rx="1.5"/>
    </g>
    <rect x="0" y="0" width="84" height="84" rx="10" fill="#1C1130" stroke="#B68CEB" stroke-width="1.5"/>
    <circle cx="42" cy="42" r="19" fill="none" stroke="#34E1E6" stroke-width="1.2" opacity="0.4"/>
    <circle cx="42" cy="42" r="11" fill="#34E1E6">
      <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="11;12;11" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="106" text-anchor="middle" fill="#7C5AA6" font-size="12" letter-spacing="2">U1</text>
  </g>

  <!-- identity text -->
  <circle cx="178" cy="83" r="4.5" fill="#34E1E6">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="192" y="88" fill="#9C88B4" font-size="13" letter-spacing="3">STATUS: ONLINE</text>

  <text x="176" y="140" fill="#F1EAF8" font-size="41" font-weight="700" letter-spacing="1.5">MUHAMMAD MIQDAD AHMAD</text>

  <text x="178" y="177" fill="#34E1E6" font-size="14" letter-spacing="3.5">EMBEDDED SYSTEMS ENGINEER · FIRMWARE · IOT · EDGE AI</text>
  <line x1="178" y1="192" x2="612" y2="192" stroke="#7C5AA6" stroke-width="1.4" opacity="0.6"/>

  <!-- top-right designator -->
  <text x="960" y="34" text-anchor="end" fill="#7C5AA6" font-size="12" letter-spacing="2">U1 · MMA</text>
</svg>
